name: Scrape & Update Data

on:
  schedule:
    # Ogni lunedì alle 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Seed database if missing
        run: |
          if [ ! -f data/immobiliare.db ]; then
            npx tsx scripts/seed.ts
          fi

      - name: Scrape prices from Immobiliare.it
        run: npm run scrape:prices

      - name: Export updated data to JSON
        run: npm run export:json

      - name: Commit updated data
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/immobiliare.db data/zones.json
          git diff --staged --quiet || git commit -m "chore: update data from scraping [$(date +%Y-%m-%d)]"
          git push
