name: Scrape Immobiliare.it Prices

on:
  schedule:
    # Ogni lunedì alle 6:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Seed database if missing
        run: |
          if [ ! -f data/immobiliare.db ]; then
            npx tsx scripts/seed.ts
          fi

      - name: Scrape prices
        run: npm run scrape:prices

      - name: Commit updated database
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add data/immobiliare.db
          git diff --staged --quiet || git commit -m "chore: update prices from immobiliare.it [$(date +%Y-%m-%d)]"
          git push
